<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snowfall</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❄️</text></svg>">
<style>
:root {
    --bg: #0a0a14;
    --surface: #16162a;
    --accent: #ff6b35;
    --accent-light: #ff8c42;
    --accent-dark: #d94f1a;
    --accent-glow: rgba(255, 107, 53, 0.15);
    --accent-subtle: rgba(255, 107, 53, 0.06);
    --text: #f0ece4;
    --text-dim: #8a8a9a;
    --text-muted: #5a5a6e;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --mono: "SF Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
}
canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #0a0a14;
}
#controls {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--accent-subtle);
    border-radius: var(--radius-lg);
    padding: 16px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    z-index: 10;
    max-width: 95vw;
}
#wind-indicator {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-dim);
    pointer-events: none;
}
#wind-arrow {
    display: inline-block;
    transition: transform 0.3s;
    font-size: 1.2rem;
}
h1 {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    text-transform: uppercase;
    letter-spacing: 0.35em;
    font-weight: 200;
    opacity: 0.3;
    font-size: 0.8rem;
    pointer-events: none;
    z-index: 10;
}
.ctl-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}
.ctl-group label {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-muted);
}
.ctl-group input[type="range"] {
    width: 90px;
    accent-color: var(--accent);
    background: transparent;
}
.ctl-group .val {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent);
}
.ctl-group select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--accent-subtle);
    border-radius: var(--radius-sm);
    padding: 4px 8px;
    font-size: 0.7rem;
    font-family: var(--font);
}
.ctl-group select:focus { outline: none; border-color: var(--accent); }
#hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--text-muted);
    font-size: 0.6rem;
    z-index: 10;
    pointer-events: none;
}
</style>
</head>
<body>
<h1>Snowfall</h1>
<div id="wind-indicator">
<span id="wind-arrow">→</span>
<span id="wind-label">Wind: 0.0</span>
</div>
<canvas id="canvas"></canvas>
<div id="controls">
<div class="ctl-group">
<label>Flakes</label>
<input type="range" id="count" min="50" max="500" value="200" step="10">
<div class="val" id="count-val">200</div>
</div>
<div class="ctl-group">
<label>Speed</label>
<input type="range" id="speed" min="0.2" max="3" value="1" step="0.1">
<div class="val" id="speed-val">1.0</div>
</div>
<div class="ctl-group">
<label>Wind</label>
<input type="range" id="wind" min="-3" max="3" value="0" step="0.1">
<div class="val" id="wind-val">0.0</div>
</div>
<div class="ctl-group">
<label>Colors</label>
<select id="mode">
<option value="winter">Winter</option>
<option value="spring">Spring</option>
<option value="random">Random</option>
</select>
</div>
</div>
<div id="hint">Click to add wind · Scroll to adjust</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const countSlider = document.getElementById('count');
const speedSlider = document.getElementById('speed');
const windSlider = document.getElementById('wind');
const modeSelect = document.getElementById('mode');
const countVal = document.getElementById('count-val');
const speedVal = document.getElementById('speed-val');
const windVal = document.getElementById('wind-val');
const windArrow = document.getElementById('wind-arrow');
const windLabel = document.getElementById('wind-label');

let W, H;
let particles = [];
let targetCount = 200;
let wind = 0;
let speedMultiplier = 1;
let colorMode = 'winter';
let lastTime = 0;

function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

function randomColor(mode) {
    switch (mode) {
        case 'winter':
            return { r: 200 + Math.random() * 55, g: 220 + Math.random() * 35, b: 240 + Math.random() * 15, a: 0.6 + Math.random() * 0.4 };
        case 'spring':
            return { r: 100 + Math.random() * 155, g: 200 + Math.random() * 55, b: 100 + Math.random() * 155, a: 0.6 + Math.random() * 0.4 };
        case 'random':
            return { r: Math.random() * 255, g: Math.random() * 255, b: Math.random() * 255, a: 0.6 + Math.random() * 0.4 };
        default:
            return { r: 255, g: 255, b: 255, a: 0.9 };
    }
}

function createParticle() {
    const size = 1.5 + Math.random() * 4;
    return {
        x: Math.random() * W,
        y: Math.random() * -H,
        size: size,
        speed: 30 + Math.random() * 80,
        swayAmp: 20 + Math.random() * 60,
        swayFreq: 0.5 + Math.random() * 1.5,
        swayOffset: Math.random() * Math.PI * 2,
        color: randomColor(colorMode),
        alpha: 0.5 + Math.random() * 0.5
    };
}

function initParticles(count) {
    particles = [];
    for (let i = 0; i < count; i++) {
        const p = createParticle();
        p.y = Math.random() * H; // spread across screen
        particles.push(p);
    }
}

function syncCount() {
    while (particles.length < targetCount) {
        particles.push(createParticle());
    }
    if (particles.length > targetCount) {
        particles.length = targetCount;
    }
}

function update(dt) {
    const speed = speedMultiplier;
    const windForce = wind;
    for (let p of particles) {
        p.y += p.speed * speed * dt;
        p.x += windForce * 30 * speed * dt + Math.sin(p.swayOffset + performance.now() / 1000 * p.swayFreq) * p.swayAmp * speed * dt * 0.3;

        // Wrap around
        if (p.y > H + p.size) {
            p.y = -p.size;
            p.x = Math.random() * W;
            p.color = randomColor(colorMode);
        }
        if (p.x < -p.size * 2) p.x = W + p.size;
        if (p.x > W + p.size * 2) p.x = -p.size;
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    // Subtle bg gradient
    const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
    grad.addColorStop(0, '#0f0f24');
    grad.addColorStop(1, '#0a0a14');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    for (let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        const c = p.color;
        ctx.fillStyle = `rgba(${Math.round(c.r)},${Math.round(c.g)},${Math.round(c.b)},${c.a})`;
        ctx.fill();
    }
}

function loop(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min((ts - lastTime) / 1000, 0.05); // cap delta
    lastTime = ts;

    update(dt);
    draw();
    requestAnimationFrame(loop);
}

// Controls
countSlider.addEventListener('input', () => {
    targetCount = parseInt(countSlider.value);
    countVal.textContent = targetCount;
    syncCount();
});

speedSlider.addEventListener('input', () => {
    speedMultiplier = parseFloat(speedSlider.value);
    speedVal.textContent = speedMultiplier.toFixed(1);
});

windSlider.addEventListener('input', () => {
    wind = parseFloat(windSlider.value);
    windVal.textContent = wind.toFixed(1);
    updateWindDisplay();
});

modeSelect.addEventListener('change', () => {
    colorMode = modeSelect.value;
    // Recolor existing particles
    for (let p of particles) {
        p.color = randomColor(colorMode);
    }
});

function updateWindDisplay() {
    const degrees = wind * 20;
    windArrow.style.transform = `rotate(${degrees}deg)`;
    windArrow.textContent = wind > 0.1 ? '→' : wind < -0.1 ? '←' : '↑';
    windLabel.textContent = `Wind: ${wind.toFixed(1)}`;
}

// Click to add wind burst
canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const dir = (cx / W) * 6 - 3; // -3 to 3
    wind = Math.max(-3, Math.min(3, wind + dir * 0.3));
    windSlider.value = wind;
    windVal.textContent = wind.toFixed(1);
    updateWindDisplay();
});

// Scroll to adjust wind
canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    wind = Math.max(-3, Math.min(3, wind + (e.deltaY > 0 ? -0.3 : 0.3)));
    windSlider.value = wind;
    windVal.textContent = wind.toFixed(1);
    updateWindDisplay();
}, { passive: false });

initParticles(200);
requestAnimationFrame(loop);
</script>
</body>
</html>
